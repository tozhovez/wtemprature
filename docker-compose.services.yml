networks:
  devapp:
    name: devapp
    driver: bridge

services:
  server:
    container_name: server
    hostname: server
    build:
      context: .
      dockerfile: server/Dockerfile
    ports:
      - "0.0.0.0:6767:6767"
    volumes:
      - ${CONFIGS_STORAGE}/server/infra:/infra
      - ${DATA_STORAGE}/server/data:/data
    
    networks:
      - devapp
    command: ["python", "main.py"]
    